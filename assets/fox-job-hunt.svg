<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360" role="img" aria-labelledby="t d" font-family="'Space Grotesk','Inter','Segoe UI',Helvetica,Arial,sans-serif">
  <title id="t">Foxhound — a fox on the hunt for a job</title>
  <desc id="d">A fox scans a scrolling job board with a magnifying glass on a dark, violet-accented interface, wearing an "open to work" badge.</desc>
  <defs>
    <clipPath id="card"><rect x="0" y="0" width="760" height="360" rx="18"/></clipPath>
    <clipPath id="listClip"><rect x="432" y="120" width="256" height="150"/></clipPath>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#F0F0F0" stroke-width="1" stroke-opacity="0.05"/>
    </pattern>
    <radialGradient id="vglow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aglow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F0922F" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#F0922F" stop-opacity="0"/>
    </radialGradient>
    <style>
      .bob{animation:bob 3.4s ease-in-out infinite}
      .blink{animation:blink 4.2s infinite;transform-box:fill-box;transform-origin:center}
      .pulse{animation:pulse 2.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .scroll{animation:scroll 12s linear infinite}
      .beam{animation:beam 1.4s linear infinite}
      .live{animation:live 1.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .float{animation:floaty 6s ease-in-out infinite alternate;transform-box:fill-box}
      .dot{animation:blinkdot 1.5s infinite}.b{animation-delay:.25s}.c{animation-delay:.5s}
      @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.12)}}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
      @keyframes scroll{0%{transform:translateY(0)}100%{transform:translateY(-170px)}}
      @keyframes beam{to{stroke-dashoffset:-16}}
      @keyframes live{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
      @keyframes floaty{to{transform:translate(20px,12px)}}
      @keyframes blinkdot{0%,100%{opacity:.25}50%{opacity:1}}
    </style>
  </defs>

  <g clip-path="url(#card)">
    <rect x="0" y="0" width="760" height="360" fill="#0A0A0C"/>
    <rect x="0" y="0" width="760" height="360" fill="url(#grid)"/>
    <ellipse class="float" cx="565" cy="176" rx="230" ry="180" fill="url(#vglow)"/>
    <ellipse cx="205" cy="205" rx="205" ry="190" fill="url(#aglow)"/>
    <rect x="40" y="300" width="680" height="2" fill="url(#vglow)" opacity="0.7"/>
  </g>
  <rect x="1" y="1" width="758" height="358" rx="18" fill="none" stroke="#8B5CF6" stroke-opacity="0.16" stroke-width="1.5"/>

  <g>
    <rect x="28" y="24" width="196" height="28" rx="14" fill="#141418" stroke="#8B5CF6" stroke-opacity="0.28"/>
    <circle cx="46" cy="38" r="7" fill="#8B5CF6" opacity="0.25" class="live"/>
    <circle cx="46" cy="38" r="3.5" fill="#A78BFA"/>
    <text x="60" y="42" fill="#B9B4C7" font-size="12" letter-spacing=".3">scanning 2,499 roles</text>
  </g>

  <ellipse cx="205" cy="336" rx="120" ry="13" fill="#000" opacity=".45"/>

  <g class="bob">
    <g>
      <path d="M250 250 C196 232 128 250 116 302 C152 304 206 300 258 284 Z" fill="#C96A22"/>
      <path d="M116 302 C124 268 150 254 178 258 C160 276 150 294 150 302 Z" fill="#F6E4CE"/>
      <animateTransform attributeName="transform" type="rotate" values="7 246 250;-9 246 250;7 246 250" dur="2.4s" repeatCount="indefinite"/>
    </g>

    <ellipse cx="208" cy="272" rx="96" ry="78" fill="#DB7526"/>
    <path d="M208 194 A96 78 0 0 1 304 272" fill="none" stroke="#A78BFA" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>
    <ellipse cx="212" cy="294" rx="56" ry="52" fill="#F6E4CE"/>

    <g>
      <path d="M150 140 L126 56 L216 120 Z" fill="#DB7526"/>
      <path d="M160 132 L148 82 L204 122 Z" fill="#F6E4CE"/>
      <animateTransform attributeName="transform" type="rotate" values="0 172 122;-8 172 122;3 172 122;0 172 122" keyTimes="0;0.9;0.96;1" dur="5.5s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M268 140 L292 56 L202 120 Z" fill="#DB7526"/>
      <path d="M258 132 L270 82 L214 122 Z" fill="#F6E4CE"/>
      <animateTransform attributeName="transform" type="rotate" values="0 246 122;8 246 122;-3 246 122;0 246 122" keyTimes="0;0.9;0.96;1" dur="5.5s" repeatCount="indefinite"/>
    </g>

    <ellipse cx="209" cy="168" rx="87" ry="70" fill="#EA8730"/>
    <path d="M209 98 A87 70 0 0 1 295 165" fill="none" stroke="#A78BFA" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
    <path d="M146 178 Q209 150 272 178 L238 236 Q209 255 180 236 Z" fill="#F6E4CE"/>

    <g class="blink"><ellipse cx="176" cy="166" rx="12" ry="15" fill="#2A2230"/><circle cx="180" cy="160" r="4" fill="#EDE7FA"/></g>
    <g class="blink"><ellipse cx="244" cy="166" rx="12" ry="15" fill="#2A2230"/><circle cx="248" cy="160" r="4" fill="#EDE7FA"/></g>

    <path d="M200 206 Q210 201 220 206 Q216 220 210 225 Q204 220 200 206 Z" fill="#2A2230"/>
    <path d="M210 225 Q196 239 183 231 M210 225 Q224 239 237 231" fill="none" stroke="#2A2230" stroke-width="2.4" stroke-linecap="round"/>

    <g class="pulse">
      <rect x="144" y="288" width="142" height="28" rx="14" fill="#8B5CF6"/>
      <rect x="144" y="288" width="142" height="28" rx="14" fill="none" stroke="#A78BFA" stroke-opacity="0.6"/>
      <circle cx="164" cy="302" r="4.5" fill="#EDE7FA"/>
      <text x="178" y="306" fill="#F5F2FF" font-size="12" font-weight="700" letter-spacing=".3">OPEN TO WORK</text>
    </g>

    <g>
      <ellipse cx="300" cy="214" rx="21" ry="17" fill="#F6E4CE"/>
      <line x1="300" y1="206" x2="346" y2="168" stroke="#CDBEF0" stroke-width="9" stroke-linecap="round"/>
      <circle cx="362" cy="150" r="26" fill="#8B5CF6" fill-opacity=".18" stroke="#A78BFA" stroke-width="7"/>
      <path d="M352 140 Q356 138 362 138" stroke="#EDE7FA" stroke-width="3" fill="none" stroke-linecap="round" opacity=".85"/>
      <animateTransform attributeName="transform" type="rotate" values="-7 300 210;6 300 210;-7 300 210" dur="3.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <line x1="388" y1="150" x2="424" y2="150" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 6" class="beam"/>

  <rect x="420" y="70" width="282" height="232" rx="14" fill="#141418" stroke="#8B5CF6" stroke-opacity="0.22" stroke-width="1.5"/>
  <text x="442" y="104" fill="#F0F0F0" font-size="14" font-weight="700" letter-spacing=".6">opportunities</text>
  <circle cx="676" cy="99" r="8" fill="#34D399" opacity="0.22" class="live"/>
  <circle cx="676" cy="99" r="4" fill="#34D399"/>
  <line x1="442" y1="114" x2="686" y2="114" stroke="#F0F0F0" stroke-opacity="0.07" stroke-width="1.5"/>

  <g clip-path="url(#listClip)">
    <g class="scroll">
      <g transform="translate(0,124)">
        <rect x="436" y="0" width="252" height="28" rx="7" fill="#1C1C22"/><text x="448" y="18" fill="#B7B2C2" font-size="12">Senior software engineer</text><text x="678" y="18" text-anchor="end" fill="#6F6A79" font-size="11" font-weight="700">86%</text>
        <rect x="436" y="34" width="252" height="28" rx="7" fill="#1C1C22"/><text x="448" y="52" fill="#B7B2C2" font-size="12">Product designer</text><text x="678" y="52" text-anchor="end" fill="#6F6A79" font-size="11" font-weight="700">78%</text>
        <rect x="436" y="68" width="252" height="28" rx="7" fill="#1C1C22"/><text x="448" y="86" fill="#B7B2C2" font-size="12">Data scientist</text><text x="678" y="86" text-anchor="end" fill="#6F6A79" font-size="11" font-weight="700">91%</text>
        <rect x="436" y="102" width="252" height="28" rx="7" fill="#1C1C22"/><text x="448" y="120" fill="#B7B2C2" font-size="12">DevOps engineer</text><text x="678" y="120" text-anchor="end" fill="#6F6A79" font-size="11" font-weight="700">82%</text>
        <rect x="436" y="136" width="252" height="28" rx="7" fill="#1E1830" stroke="#8B5CF6" stroke-opacity="0.5" stroke-width="1.5"/><path d="M450 150 l4 4 l7 -8" fill="none" stroke="#34D399" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><text x="470" y="154" fill="#E9E2FF" font-size="12" font-weight="700">Staff frontend engineer</text><text x="678" y="154" text-anchor="end" fill="#34D399" font-size="11" font-weight="700">98%</text>
      </g>
      <g transform="translate(0,294)">
        <rect x="436" y="0" width="252" height="28" rx="7" fill="#1C1C22"/><text x="448" y="18" fill="#B7B2C2" font-size="12">Senior software engineer</text><text x="678" y="18" text-anchor="end" fill="#6F6A79" font-size="11" font-weight="700">86%</text>
        <rect x="436" y="34" width="252" height="28" rx="7" fill="#1C1C22"/><text x="448" y="52" fill="#B7B2C2" font-size="12">Product designer</text><text x="678" y="52" text-anchor="end" fill="#6F6A79" font-size="11" font-weight="700">78%</text>
        <rect x="436" y="68" width="252" height="28" rx="7" fill="#1C1C22"/><text x="448" y="86" fill="#B7B2C2" font-size="12">Data scientist</text><text x="678" y="86" text-anchor="end" fill="#6F6A79" font-size="11" font-weight="700">91%</text>
        <rect x="436" y="102" width="252" height="28" rx="7" fill="#1C1C22"/><text x="448" y="120" fill="#B7B2C2" font-size="12">DevOps engineer</text><text x="678" y="120" text-anchor="end" fill="#6F6A79" font-size="11" font-weight="700">82%</text>
        <rect x="436" y="136" width="252" height="28" rx="7" fill="#1E1830" stroke="#8B5CF6" stroke-opacity="0.5" stroke-width="1.5"/><path d="M450 150 l4 4 l7 -8" fill="none" stroke="#34D399" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><text x="470" y="154" fill="#E9E2FF" font-size="12" font-weight="700">Staff frontend engineer</text><text x="678" y="154" text-anchor="end" fill="#34D399" font-size="11" font-weight="700">98%</text>
      </g>
    </g>
  </g>

  <text x="380" y="342" text-anchor="middle" fill="#8E8898" font-size="14" letter-spacing=".3">on the hunt for the right role</text>
  <circle cx="486" cy="338" r="2.4" fill="#8B5CF6" class="dot"/>
  <circle cx="496" cy="338" r="2.4" fill="#8B5CF6" class="dot b"/>
  <circle cx="506" cy="338" r="2.4" fill="#8B5CF6" class="dot c"/>
</svg>
